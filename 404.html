<style>
:root{
  --bg:#08080a; --bg-soft:#0d0e11;
  --red:#e60013; --red-bright:#ff2a3a; --red-dim:rgba(230,0,19,.5);
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.12);
  --txt:#f6f6f7; --muted:rgba(255,255,255,.55); --faint:rgba(255,255,255,.32);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--red);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#26272b;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--red-dim)}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:2px}
img{max-width:100%;height:auto}
.font-display{font-family:'Chakra Petch',sans-serif}
.text-red{color:var(--red-bright)}

/* ═══════════ Brand wordmark ═══════════ */
.logo{display:inline-flex;align-items:center;gap:.6rem;text-decoration:none}
.logo-mark{display:inline-flex;width:22px;height:22px}
.logo-text{font-family:'Chakra Petch',sans-serif;font-weight:700;letter-spacing:.14em;font-size:.95rem;line-height:1;white-space:nowrap}
.logo-text .lb{color:#fff}
.logo-text .lv{color:var(--red);margin-left:.35em}

/* ═══════════ Nav ═══════════ */
.nav-blur{background:rgba(8,8,10,.72);-webkit-backdrop-filter:blur(18px) saturate(140%);backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid var(--line)}
.nav-link{position:relative;font-size:.82rem;font-weight:500;letter-spacing:.01em;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-link:hover{color:#fff}
.nav-link.active{color:#fff}
.nav-link.active::after{content:"";position:absolute;left:0;right:0;bottom:-19px;height:2px;background:var(--red);box-shadow:0 0 10px var(--red-dim)}

/* ═══════════ Backgrounds (no photos) ═══════════ */
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:52px 52px;-webkit-mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 10%,transparent 75%);mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 10%,transparent 75%)}
.glow-red{position:absolute;pointer-events:none;border-radius:50%;filter:blur(70px);background:radial-gradient(circle,rgba(230,0,19,.22),transparent 70%)}

/* ═══════════ Buttons ═══════════ */
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:.7rem 1.5rem;background:var(--red);color:#fff;font-size:.85rem;font-weight:600;border-radius:6px;transition:all .2s;text-decoration:none;border:none;cursor:pointer;box-shadow:0 0 0 rgba(230,0,19,0)}
.btn-primary:hover{background:var(--red-bright);transform:translateY(-1px);box-shadow:0 8px 24px -8px var(--red-dim)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:.7rem 1.5rem;border:1px solid var(--line-2);color:var(--txt);font-size:.85rem;font-weight:500;border-radius:6px;transition:all .2s;text-decoration:none;background:transparent;cursor:pointer}
.btn-ghost:hover{border-color:var(--red-dim);background:rgba(230,0,19,.06);color:#fff}

/* ═══════════ Cards / tags / bits ═══════════ */
.card-hover{position:relative;transition:all .25s ease;border:1px solid var(--line);background:rgba(255,255,255,.014);border-radius:10px}
.card-hover:hover{border-color:var(--red-dim);background:rgba(255,255,255,.03);transform:translateY(-2px)}
.card-hover::before{content:"";position:absolute;left:0;top:0;height:2px;width:0;background:var(--red);border-radius:10px 10px 0 0;transition:width .3s ease;box-shadow:0 0 12px var(--red-dim)}
.card-hover:hover::before{width:100%}
.tag{display:inline-block;padding:3px 10px;font-size:11px;font-weight:500;letter-spacing:.03em;text-transform:uppercase;border:1px solid var(--line-2);color:var(--faint);border-radius:4px;transition:all .2s;font-family:'JetBrains Mono',monospace}
.card-hover:hover .tag{border-color:rgba(230,0,19,.28);color:var(--muted)}
.code-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--red-bright);letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.section-line{width:36px;height:2px;background:var(--red);margin:1rem auto;box-shadow:0 0 10px var(--red-dim)}
.stat-num{font-family:'Chakra Petch',sans-serif;font-size:2.5rem;font-weight:700;letter-spacing:-.02em}@media(min-width:640px){.stat-num{font-size:3rem}}
.eyebrow{display:inline-flex;align-items:center;gap:.6rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--red)}

/* headings via display font */
.hero-title,.page-title{font-family:'Chakra Petch',sans-serif;font-weight:700;letter-spacing:-.01em}
.hero-title{font-size:2.6rem;line-height:1.06}@media(min-width:640px){.hero-title{font-size:3.6rem}}@media(min-width:1024px){.hero-title{font-size:4.75rem}}
.hero-pill{display:inline-flex;align-items:center;gap:.6rem;padding:.4rem 1rem;border-radius:999px;border:1px solid var(--line-2);background:rgba(255,255,255,.03);font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.page-title{font-size:2.3rem;line-height:1.08}@media(min-width:640px){.page-title{font-size:3.1rem}}@media(min-width:1024px){.page-title{font-size:3.75rem}}
.h-sec{font-family:'Chakra Petch',sans-serif;font-weight:600;letter-spacing:-.01em}

/* ═══════════ Forms ═══════════ */
.inp{width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:6px;color:var(--txt);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--red-dim);box-shadow:0 0 0 3px rgba(230,0,19,.08)}.inp::placeholder{color:rgba(255,255,255,.25)}
.form-label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:.4rem;font-family:'JetBrains Mono',monospace}
select.inp option{background:#111;color:var(--txt)}

/* ═══════════ Pagination ═══════════ */
.pager{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:3rem;flex-wrap:wrap}
.pager button,.pager .page-dot{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:38px;padding:0 .7rem;font-size:.85rem;font-weight:500;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;font-family:'JetBrains Mono',monospace}
.pager button:hover:not(:disabled){border-color:var(--red-dim);color:#fff;background:rgba(230,0,19,.06)}
.pager button.active{background:var(--red);border-color:var(--red);color:#fff}
.pager button:disabled{opacity:.3;cursor:not-allowed}
.pager .page-dot{border:none;cursor:default;background:transparent}

/* ═══════════ Animations ═══════════ */
.fade-in{opacity:0;transform:translateY(20px);animation:fadeIn .6s ease forwards}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}.delay-4{animation-delay:.4s}
[data-observe]{opacity:0;transform:translateY(24px);transition:all .6s ease-out}
[data-observe].visible{opacity:1;transform:translateY(0)}

/* ═══════════ Post content typography ═══════════ */
.post-content h1{font-family:'Chakra Petch',sans-serif;font-size:1.9rem;font-weight:700;letter-spacing:-.01em;margin:2.25rem 0 1rem;line-height:1.2}
.post-content h2{font-family:'Chakra Petch',sans-serif;font-size:1.55rem;font-weight:600;margin:2.25rem 0 .85rem;line-height:1.25;padding-bottom:.4rem;border-bottom:1px solid var(--line)}
.post-content h3{font-family:'Chakra Petch',sans-serif;font-size:1.22rem;font-weight:600;margin:1.6rem 0 .5rem}
.post-content p{color:rgba(255,255,255,.72);line-height:1.78;margin-bottom:1.25rem;font-size:.96rem}
.post-content strong{color:#fff;font-weight:600}
.post-content a{color:var(--red-bright);text-decoration:underline;text-underline-offset:2px;text-decoration-color:rgba(230,0,19,.4);transition:all .2s}
.post-content a:hover{text-decoration-color:var(--red-bright)}
.post-content ul,.post-content ol{margin:1rem 0 1.5rem;padding-left:1.5rem;color:rgba(255,255,255,.72);line-height:1.78}
.post-content li{margin-bottom:.4rem}
.post-content ul li{list-style:none;position:relative}
.post-content ul li::before{content:"";position:absolute;left:-1.1rem;top:.62em;width:5px;height:5px;background:var(--red);border-radius:1px}
.post-content ol li{list-style:decimal}
.post-content ol li::marker{color:var(--red-bright);font-weight:600}
.post-content blockquote{border-left:2px solid var(--red);padding:1rem 1.5rem;margin:1.5rem 0;background:rgba(230,0,19,.04);border-radius:0 6px 6px 0}
.post-content blockquote p{color:rgba(255,255,255,.7);font-style:italic;margin-bottom:0}
.post-content code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px;color:#ff8a92;border:1px solid var(--line)}
.post-content pre{background:transparent;border-radius:6px;overflow-x:auto}
.post-content pre code{background:transparent;padding:0;border-radius:0;border:none;color:#e6e6e6;font-size:.82rem;line-height:1.6}
.post-content img{max-width:100%;border-radius:8px;margin:1.5rem 0;border:1px solid var(--line)}
.post-content table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:.88rem}
.post-content th,.post-content td{border:1px solid var(--line);padding:.65rem .9rem;text-align:left}
.post-content th{background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;font-family:'JetBrains Mono',monospace}
.post-content td{color:rgba(255,255,255,.68)}
.post-content hr{border:none;border-top:1px solid var(--line);margin:2rem 0}

/* ═══════════ Reading progress ═══════════ */
#readProgress{position:fixed;top:0;left:0;height:2px;width:0;z-index:60;background:linear-gradient(90deg,var(--red),var(--red-bright));box-shadow:0 0 10px var(--red-dim);transition:width .1s linear}

/* ═══════════ Article layout + TOC ═══════════ */
.article-grid{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:1024px){.article-grid{grid-template-columns:minmax(0,1fr) 220px;gap:3.5rem}}
.toc-wrap{display:none}
@media(min-width:1024px){.toc-wrap{display:block}}
.toc{position:sticky;top:5.5rem;font-size:.8rem;border-left:1px solid var(--line);padding-left:1rem}
.toc-title{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:.75rem}
.toc a{display:block;color:var(--faint);text-decoration:none;padding:.28rem 0;line-height:1.35;transition:color .2s,border-color .2s;border-left:2px solid transparent;margin-left:-1rem;padding-left:calc(1rem - 2px)}
.toc a:hover{color:rgba(255,255,255,.85)}
.toc a.toc-h3{padding-left:calc(1.9rem - 2px);font-size:.75rem}
.toc a.active{color:#fff;border-left-color:var(--red)}

/* ═══════════ Heading anchors ═══════════ */
.post-content h1,.post-content h2,.post-content h3{scroll-margin-top:5.5rem;position:relative}
.post-content .anchor{position:absolute;left:-1.1rem;top:0;color:var(--red-dim);text-decoration:none;opacity:0;transition:opacity .2s;font-weight:400}
.post-content h1:hover .anchor,.post-content h2:hover .anchor,.post-content h3:hover .anchor{opacity:1}
.post-content .anchor:hover{color:var(--red-bright)}

/* ═══════════ Enhanced code blocks ═══════════ */
.code-block{margin:1.5rem 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#0a0b0d}
.code-head{display:flex;align-items:center;justify-content:space-between;padding:.5rem .85rem;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line)}
.code-lang{display:inline-flex;align-items:center;gap:.45rem;font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.code-lang::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--lang-c,#6b7280);box-shadow:0 0 6px var(--lang-c,#6b7280)}
.code-copy{display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--faint);background:transparent;border:1px solid var(--line);border-radius:5px;padding:.22rem .6rem;cursor:pointer;transition:all .18s}
.code-copy:hover{color:#fff;border-color:var(--red-dim);background:rgba(230,0,19,.06)}
.code-copy.copied{color:#a3e635;border-color:rgba(163,230,53,.3)}
.code-block pre{margin:0;border:none;border-radius:0;background:transparent;padding:1rem 1.15rem}
.code-block pre code{font-size:.8rem;line-height:1.65;color:#e6e6e6}
.code-block[data-lang="python"]{--lang-c:#4b8bbe}
.code-block[data-lang="bash"],.code-block[data-lang="sh"],.code-block[data-lang="shell"],.code-block[data-lang="zsh"]{--lang-c:#4ade80}
.code-block[data-lang="javascript"],.code-block[data-lang="js"]{--lang-c:#f7df1e}
.code-block[data-lang="typescript"],.code-block[data-lang="ts"]{--lang-c:#3178c6}
.code-block[data-lang="sql"]{--lang-c:#f59e0b}
.code-block[data-lang="html"],.code-block[data-lang="xml"]{--lang-c:#e34c26}
.code-block[data-lang="css"]{--lang-c:#2965f1}
.code-block[data-lang="go"]{--lang-c:#00add8}
.code-block[data-lang="rust"],.code-block[data-lang="rs"]{--lang-c:#f74c00}
.code-block[data-lang="perl"],.code-block[data-lang="pl"]{--lang-c:#a78bfa}
.code-block[data-lang="c"],.code-block[data-lang="cpp"],.code-block[data-lang="c++"]{--lang-c:#5c9fd6}
.code-block[data-lang="ruby"],.code-block[data-lang="rb"]{--lang-c:#cc342d}
.code-block[data-lang="php"]{--lang-c:#777bb4}
.code-block[data-lang="java"]{--lang-c:#e76f00}
.code-block[data-lang="json"]{--lang-c:#84cc16}
.code-block[data-lang="yaml"],.code-block[data-lang="yml"]{--lang-c:#cb171e}
.code-block[data-lang="powershell"],.code-block[data-lang="ps1"]{--lang-c:#5391fe}
.code-block[data-lang="dockerfile"],.code-block[data-lang="docker"]{--lang-c:#2496ed}

/* highlight.js — BLACK VECTR syntax theme */
.hljs{color:#e6e6e6;background:transparent}
.hljs-comment,.hljs-quote{color:#6b7280;font-style:italic}
.hljs-keyword,.hljs-selector-tag,.hljs-literal,.hljs-doctag,.hljs-name{color:#c792ea}
.hljs-string,.hljs-regexp,.hljs-addition{color:#98c379}
.hljs-number,.hljs-symbol,.hljs-bullet,.hljs-meta .hljs-number{color:#d19a66}
.hljs-title,.hljs-title.function_,.hljs-section{color:#61afef}
.hljs-title.class_,.hljs-class .hljs-title,.hljs-type,.hljs-built_in{color:#e5c07b}
.hljs-attr,.hljs-attribute,.hljs-variable,.hljs-template-variable,.hljs-selector-attr,.hljs-selector-pseudo{color:#e06c75}
.hljs-tag{color:#abb2bf}.hljs-tag .hljs-name{color:#e06c75}
.hljs-params{color:#abb2bf}
.hljs-meta,.hljs-meta .hljs-keyword,.hljs-selector-id,.hljs-selector-class{color:#56b6c2}
.hljs-emphasis{font-style:italic}.hljs-strong{font-weight:700}
.hljs-deletion{color:#e06c75}

/* ═══════════ Callouts ═══════════ */
.callout{display:flex;gap:.85rem;padding:1rem 1.15rem;margin:1.5rem 0;border-radius:8px;border:1px solid var(--cl-b,var(--line));background:var(--cl-bg,rgba(255,255,255,.02));border-left-width:3px}
.callout-ico{flex-shrink:0;font-size:.95rem;margin-top:.1rem;color:var(--cl-a,var(--muted))}
.callout-body{min-width:0;flex:1}
.callout-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--cl-a,rgba(255,255,255,.7));margin-bottom:.25rem;font-family:'JetBrains Mono',monospace}
.callout-body p{margin:0!important;color:rgba(255,255,255,.72)!important;font-size:.9rem}
.callout-body p+p{margin-top:.5rem!important}
.callout.note{--cl-a:#61afef;--cl-b:rgba(97,175,239,.35);--cl-bg:rgba(97,175,239,.05)}
.callout.tip{--cl-a:#4ade80;--cl-b:rgba(74,222,128,.35);--cl-bg:rgba(74,222,128,.05)}
.callout.important{--cl-a:#c792ea;--cl-b:rgba(199,146,234,.35);--cl-bg:rgba(199,146,234,.05)}
.callout.warning{--cl-a:#fbbf24;--cl-b:rgba(251,191,36,.35);--cl-bg:rgba(251,191,36,.05)}
.callout.danger,.callout.caution{--cl-a:#ff2a3a;--cl-b:rgba(230,0,19,.4);--cl-bg:rgba(230,0,19,.06)}

/* ═══════════ Task lists ═══════════ */
.post-content .task-list{list-style:none;padding-left:.25rem}
.post-content .task-list li{display:flex;align-items:flex-start;gap:.55rem;list-style:none}
.post-content .task-list li::before{content:"";position:static;display:inline-block;width:15px;height:15px;border:1.5px solid var(--line-2);border-radius:4px;margin-top:.28rem;flex-shrink:0;background:none}
.post-content .task-list li.done::before{background:var(--red);border-color:var(--red);content:"\2713";color:#fff;font-size:11px;font-weight:800;text-align:center;line-height:13px}
.post-content .task-list li.done{color:var(--faint)}
.post-content .lead{font-size:1.075rem;line-height:1.7;color:rgba(255,255,255,.82)}
.reading-meta{display:inline-flex;align-items:center;gap:.4rem}
</style>
</head>
